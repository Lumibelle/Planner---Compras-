<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner de Compras 💖</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:20px;}
h1 { text-align:center; }
.container { max-width:900px; margin:auto;}
.card { background:white; padding:15px; margin:10px 0; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer;}
input { padding:8px; width:100%; margin:5px 0;}
</style>
</head>
<body>

<h1>Nosso Planner 💖</h1>

<div class="container">

<div class="card">
<h3>Adicionar Produto</h3>
<input id="name" placeholder="Nome do produto">
<input id="category" placeholder="Categoria">
<input id="ideal" type="number" placeholder="Quantidade ideal">
<input id="color" type="color">
<button onclick="addItem()">Adicionar</button>
</div>

<div id="list"></div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("items") || "[]");

function save() {
  localStorage.setItem("items", JSON.stringify(items));
}

function status(item){
  if(item.estoque==0) return "Comprar";
  if(item.estoque<item.ideal) return "Verificar";
  return "OK";
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";
  items.forEach((item,i)=>{
    list.innerHTML += `
    <div class="card" style="background:${item.color}">
      <b>${item.name}</b> (${item.category})<br>
      ${item.estoque}/${item.ideal} - ${status(item)}<br><br>
      <button onclick="addEstoque(${i})">+</button>
      <button onclick="removeEstoque(${i})">-</button>
      <button onclick="deleteItem(${i})">Excluir</button>
    </div>
    `;
  });
}

function addItem(){
  const name=document.getElementById("name").value;
  const category=document.getElementById("category").value;
  const ideal=parseInt(document.getElementById("ideal").value);
  const color=document.getElementById("color").value;

  if(!name) return;

  items.push({name,category,ideal,estoque:0,color});
  save();
  render();
}

function addEstoque(i){ items[i].estoque++; save(); render();}
function removeEstoque(i){ items[i].estoque--; save(); render();}
function deleteItem(i){ items.splice(i,1); save(); render();}

render();
</script>

</body>
</html>
