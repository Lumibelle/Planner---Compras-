<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart List Elegant+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

:root{
  --bg1:#1e1b4b;
  --bg2:#312e81;
  --bg3:#4f46e5;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
}

body.light{
  --bg1:#eef2ff;
  --bg2:#e0e7ff;
  --bg3:#c7d2fe;
  --card:white;
  --text:#333;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  min-height:100vh;
  padding:20px;
  transition:0.4s;
}

h2{margin-bottom:20px}

.header{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  background:var(--card);
  backdrop-filter:blur(12px);
  padding:15px;
  border-radius:20px;
  margin-bottom:20px;
}

input,select{
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.15);
  color:inherit;
}

button{
  padding:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#60a5fa);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{transform:translateY(-2px)}
.delete{background:#ef4444}

.toggleTheme{
  position:fixed;
  top:15px;
  right:15px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

.item{
  padding:15px;
  border-radius:18px;
  color:white;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  transition:0.3s;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.item.added{
  animation:pop 0.3s ease;
}

@keyframes pop{
  0%{transform:scale(0.8)}
  100%{transform:scale(1)}
}

.ok{opacity:0.5;text-decoration:line-through}
.actions{margin-top:10px;display:flex;gap:5px}

.categoria{margin-top:25px}
.categoria h3{margin-bottom:10px}

.sugestoes{background:var(--card);padding:15px;border-radius:15px;margin-bottom:15px}
</style></head><body><button class="toggleTheme" onclick="toggleTheme()">🌙/☀️</button>

<h2>💜 Smart List</h2><div class="header">
<input id="busca" placeholder="Buscar..." oninput="render()">
<select id="mes" onchange="render()">
<option value="todos">Todos</option>
<option value="jan">Jan</option>
<option value="fev">Fev</option>
<option value="mar">Mar</option>
</select>
<input id="nomeProduto" placeholder="Produto">
<select id="categoriaSelect"></select>
<button onclick="addProduto()">Adicionar</button>
<input id="novaCategoria" placeholder="Categoria">
<input id="corCategoria" type="color">
<button onclick="addCategoria()">+ Categoria</button>
</div><div class="sugestoes" id="sugestoes"></div><div class="card">
<p id="resumo"></p>
<canvas id="grafico"></canvas>
</div><div id="lista"></div><script>
let data = JSON.parse(localStorage.getItem("data")) || {
  categorias:{"Compras":"#6366f1"},
  produtos:[]
};

function toggleTheme(){
  document.body.classList.toggle("light");
}

function save(){localStorage.setItem("data",JSON.stringify(data));render()}

function atualizarSelect(){categoriaSelect.innerHTML="";Object.keys(data.categorias).forEach(cat=>{categoriaSelect.innerHTML+=`<option>${cat}</option>`})}

function addCategoria(){if(!novaCategoria.value)return;data.categorias[novaCategoria.value]=corCategoria.value;save()}

function addProduto(){
  if(!nomeProduto.value)return;
  data.produtos.push({nome:nomeProduto.value,categoria:categoriaSelect.value,mes:mes.value,comprado:false});
  nomeProduto.value="";
  save();
}

function removeProduto(i){data.produtos.splice(i,1);save()}

function toggle(i){data.produtos[i].comprado=!data.produtos[i].comprado;save()}

function sugestao(){
  let cont={};
  data.produtos.forEach(p=>{cont[p.nome]=(cont[p.nome]||0)+1});
  let sug=Object.keys(cont).filter(k=>cont[k]>1);
  sugestoes.innerHTML = sug.length ? "💡 Sugestões: " + sug.map(s=>`<button onclick="quickAdd('${s}')">${s}</button>`).join(" ") : "";
}

function quickAdd(nome){data.produtos.push({nome,categoria:Object.keys(data.categorias)[0],mes:mes.value,comprado:false});save()}

function render(){
  atualizarSelect();
  sugestao();

  let termo=busca.value.toLowerCase();
  let filtro=mes.value;

  let html="";
  let total=0;

  Object.keys(data.categorias).forEach(cat=>{
    let cor=data.categorias[cat];

    let itens=data.produtos.filter(p=>p.categoria===cat && p.nome.toLowerCase().includes(termo) && (filtro==='todos'||p.mes===filtro));

    if(!itens.length)return;

    total+=itens.length;

    html+=`<div class='categoria'>
    <h3>${cat}</h3>
    <div class='grid'>`;

    itens.forEach((p,i)=>{
      html+=`<div class='item ${p.comprado?'ok':''}' style='background:${cor}'>
      ${p.nome}
      <div class='actions'>
      <button onclick='toggle(${i})'>✔</button>
      <button class='delete' onclick='removeProduto(${i})'>🗑</button>
      </div></div>`;
    });

    html+=`</div></div>`;
  });

  lista.innerHTML=html;
  resumo.innerText=`Total: ${total}`;
}

render();
</script></body>
</html>
