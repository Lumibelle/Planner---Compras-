<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Dashboard PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{display:flex;height:100vh;background:#f4f5fb}/* Sidebar */ .sidebar{ width:80px; background:linear-gradient(180deg,#6c63ff,#8f94fb); display:flex; flex-direction:column; align-items:center; padding:20px 0; gap:20px; } .sidebar div{ width:40px;height:40px; background:rgba(255,255,255,0.2); border-radius:12px; }

/* Main */ .main{ flex:1; padding:20px; overflow:auto; }

.header{ display:flex; justify-content:space-between; margin-bottom:20px; }

.cards{ display:grid; grid-template-columns:2fr 1fr; gap:15px; }

.big-card{ background:linear-gradient(135deg,#6c63ff,#ff7eb3); color:white; padding:20px; border-radius:20px; }

.small-card{ background:white; padding:15px; border-radius:20px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }

.grid{ margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }

.item{ background:white; padding:15px; border-radius:16px; box-shadow:0 6px 15px rgba(0,0,0,0.08); }

button{ margin-top:8px; padding:6px 10px; border:none; border-radius:8px; background:#6c63ff; color:white; cursor:pointer; }

.badge{font-size:12px;padding:3px 6px;border-radius:6px;margin-top:5px;display:inline-block} .red{background:#ffe5e5;color:#d33} .yellow{background:#fff5cc;color:#b58b00} .green{background:#e6ffea;color:#2e9b4f} </style>

</head>
<body><div class="sidebar">
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div><div class="main"><div class="header">
  <h2 id="user"></h2>
</div><div class="cards">
  <div class="big-card">
    <h3>Resumo</h3>
    <p id="resumo"></p>
  </div>
  <div class="small-card">
    <canvas id="grafico"></canvas>
  </div>
</div><div class="grid" id="lista"></div></div><script>
let user = localStorage.getItem("user") || prompt("Seu nome:");
localStorage.setItem("user", user);
document.getElementById("user").innerText = "Olá, " + user;

let items = JSON.parse(localStorage.getItem("items") || "[]");

function status(i){
  if(i.estoque==0) return {txt:'comprar',cls:'red',label:'🔴 Comprar'};
  if(i.estoque<i.qtd) return {txt:'verificar',cls:'yellow',label:'🟡 Verificar'};
  return {txt:'ok',cls:'green',label:'🟢 OK'};
}

function comprar(i){items[i].estoque++;save()}

function save(){
  localStorage.setItem("items", JSON.stringify(items));
  render();
}

function render(){
  let html="";
  let total=0;
  let categorias={};

  items.forEach((i,index)=>{
    let st=status(i);
    total += i.preco * i.estoque;
    categorias[i.categoria]=(categorias[i.categoria]||0)+i.preco*i.estoque;

    html += `
    <div class="item">
      <b>${i.nome}</b><br>
      ${i.categoria}<br>
      ${i.estoque}/${i.qtd}<br>
      R$ ${i.preco}<br>
      <div class="badge ${st.cls}">${st.label}</div>
      <button onclick="comprar(${index})">+1</button>
    </div>`;
  });

  lista.innerHTML = html;
  resumo.innerText = "Total gasto: R$ " + total.toFixed(2);

  drawChart(categorias);
}

function drawChart(data){
  if(window.chart) window.chart.destroy();
  window.chart = new Chart(grafico,{
    type:'doughnut',
    data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
  });
}

render();
</script></body>
</html>
