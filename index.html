<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart List AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#ece9ff,#fdfbff);padding:20px}
h2{margin-bottom:15px}
.header{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;background:white;padding:20px;border-radius:25px;margin-bottom:20px}
input,select{padding:10px;border-radius:12px;border:1px solid #eee}
button{padding:10px;border:none;border-radius:12px;background:#6c63ff;color:white;cursor:pointer}
.delete{background:#ff5c5c}
.card{background:white;padding:20px;border-radius:20px;margin-bottom:20px}
.grid{column-count:2;column-gap:15px}
.item{display:inline-block;width:100%;margin-bottom:15px;padding:15px;border-radius:15px;color:white}
.ok{opacity:0.5;text-decoration:line-through}
.sugestoes{background:#fff3cd;padding:15px;border-radius:15px;margin-bottom:20px}
</style></head>
<body><h2>🤖 Smart List Inteligente</h2><div class="header">
<input id="busca" placeholder="Buscar..." oninput="render()">
<select id="mes" onchange="render()">
<option value="todos">Todos</option>
<option value="jan">Jan</option>
<option value="fev">Fev</option>
<option value="mar">Mar</option>
</select>
<input id="nomeProduto" placeholder="Produto">
<select id="categoriaSelect"></select>
<button onclick="addProduto()">Adicionar</button>
<input id="novaCategoria" placeholder="Categoria">
<input id="corCategoria" type="color">
<button onclick="addCategoria()">+ Categoria</button>
</div><div class="sugestoes" id="sugestoes"></div><div class="card">
<p id="resumo"></p>
<canvas id="grafico"></canvas>
</div><div id="lista"></div><script>
let data = JSON.parse(localStorage.getItem("data")) || {
  categorias:{"Compras":"#6c63ff"},
  produtos:[]
};

function save(){localStorage.setItem("data",JSON.stringify(data));render()}

function atualizarSelect(){categoriaSelect.innerHTML="";Object.keys(data.categorias).forEach(cat=>{categoriaSelect.innerHTML+=`<option>${cat}</option>`})}

function addCategoria(){if(!novaCategoria.value)return;data.categorias[novaCategoria.value]=corCategoria.value;save()}

function addProduto(){if(!nomeProduto.value)return;data.produtos.push({nome:nomeProduto.value,categoria:categoriaSelect.value,mes:mes.value,comprado:false});save()}

function removeProduto(i){data.produtos.splice(i,1);save()}

function toggle(i){data.produtos[i].comprado=!data.produtos[i].comprado;save()}

function sugestaoInteligente(){
  let contagem={};
  data.produtos.forEach(p=>{
    contagem[p.nome]=(contagem[p.nome]||0)+1;
  });

  let sugestoes = Object.keys(contagem).filter(k=>contagem[k]>1);

  let html = "💡 Sugestões: ";
  sugestoes.forEach(s=>{
    html += `<button onclick="quickAdd('${s}')">${s}</button> `;
  });

  document.getElementById("sugestoes").innerHTML = html;
}

function quickAdd(nome){
  data.produtos.push({nome,categoria:Object.keys(data.categorias)[0],mes:mes.value,comprado:false});
  save();
}

function lembrete(){
  let faltando = data.produtos.filter(p=>!p.comprado);
  if(faltando.length>5){
    document.title = "🛒 Você tem itens pendentes!";
  }
}

function render(){
  atualizarSelect();
  sugestaoInteligente();
  lembrete();

  let termo = busca.value.toLowerCase();
  let filtroMes = mes.value;
  let html="";
  let total=0;
  let contagem={};

  Object.keys(data.categorias).forEach(cat=>{
    let cor=data.categorias[cat];
    let itens=data.produtos.filter(p=>p.categoria===cat && p.nome.toLowerCase().includes(termo) && (filtroMes==='todos'||p.mes===filtroMes));

    if(!itens.length)return;

    contagem[cat]=itens.length;
    total+=itens.length;

    html+=`<div><h3>${cat}</h3><div class='grid'>`;

    itens.forEach((p,i)=>{
      html+=`<div class='item ${p.comprado?'ok':''}' style='background:${cor}'>${p.nome}<br>
      <button onclick='toggle(${i})'>✔</button>
      <button class='delete' onclick='removeProduto(${i})'>🗑</button></div>`;
    });

    html+=`</div></div>`;
  });

  lista.innerHTML=html;
  resumo.innerText=`Total: ${total}`;

  if(window.chart) chart.destroy();
  window.chart=new Chart(grafico,{type:'doughnut',data:{labels:Object.keys(contagem),datasets:[{data:Object.values(contagem)}]}});
}

render();
</script></body>
</html>
