<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart List AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{display:flex;background:#0f172a;color:#fff}

/* SIDEBAR */
.sidebar{
  width:80px;background:#020617;
  display:flex;flex-direction:column;align-items:center;
  padding:20px;gap:20px;
}
.icon{
  width:45px;height:45px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;cursor:pointer;background:#111827;
}
.icon:hover{background:#2563eb}
.active{background:#2563eb}
.icon svg{width:22px;stroke:white}

/* MAIN */
.main{flex:1;padding:20px}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:20px;
}
.card{
  background:#1e293b;padding:15px;border-radius:12px;
}

/* LISTA */
.lista{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}
.item{
  background:#334155;padding:10px;border-radius:10px;
}

button{
  margin-top:5px;padding:5px;border:none;
  border-radius:6px;background:#2563eb;color:#fff;
  cursor:pointer;
}
.delete{background:#ef4444}
.hidden{display:none}
</style>
</head>

<body>

<div class="sidebar">

<div class="icon active" onclick="setView('home',this)">
<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/></svg>
</div>

<div class="icon" onclick="setView('lista',this)">
<svg viewBox="0 0 24 24"><path d="M6 6h15l-1 9H6z"/></svg>
</div>

<div class="icon" onclick="setView('gastos',this)">
<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M6 14l3-3 4 4 5-6"/></svg>
</div>

<div class="icon" onclick="setView('historico',this)">
<svg viewBox="0 0 24 24"><path d="M12 8v5l3 3"/><circle cx="12" cy="12" r="9"/></svg>
</div>

</div>

<div class="main">

<h2>Smart List AI</h2>

<!-- HOME -->
<div id="home">
<div class="cards">
<div class="card">Gasto atual: R$ <span id="gastoAtual"></span></div>
<div class="card">Previsão IA: R$ <span id="previsao"></span></div>
<div class="card">Mês atual: <span id="mesAtual"></span></div>
<div class="card">Itens: <span id="total"></span></div>
</div>

<canvas id="chart"></canvas>
</div>

<!-- LISTA -->
<div id="lista" class="hidden">
<input id="nome" placeholder="Produto">
<input id="preco" placeholder="Preço">
<button onclick="addProduto()">Adicionar</button>

<div class="lista" id="listaProdutos"></div>
</div>

<!-- GASTOS -->
<div id="gastos" class="hidden">
<canvas id="chartGastos"></canvas>
</div>

<!-- HISTORICO -->
<div id="historico" class="hidden">
<canvas id="chartHistorico"></canvas>
</div>

</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("data")) || {
 produtos:[],
 historico:{}
};

// DATA ATUAL
let hoje = new Date();
let mes = hoje.getMonth();
let ano = hoje.getFullYear();
let chaveMes = `${mes}-${ano}`;

// SALVAR
function save(){
 localStorage.setItem("data",JSON.stringify(data));
 render();
}

// NAVEGAÇÃO
function setView(v,el){
 document.querySelectorAll(".icon").forEach(i=>i.classList.remove("active"));
 el.classList.add("active");

 document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(v).classList.remove("hidden");
}

// ADD
function addProduto(){
 data.produtos.push({
  nome:nome.value,
  preco:Number(preco.value),
  comprado:0
 });
 save();
}

// COMPRAR
function comprar(i){
 data.produtos[i].comprado++;
 save();
}

// RENDER
function render(){

 let gasto=0;

 data.produtos.forEach(p=>{
  gasto += p.preco * p.comprado;
 });

 // salvar histórico automático
 data.historico[chaveMes] = gasto;

 // previsão IA (média últimos meses)
 let valores = Object.values(data.historico);
 let media = valores.reduce((a,b)=>a+b,0)/ (valores.length||1);

 // UI
 gastoAtual.innerText=gasto.toFixed(2);
 previsao.innerText=media.toFixed(2);
 mesAtual.innerText=chaveMes;
 total.innerText=data.produtos.length;

 // lista
 let html="";
 data.produtos.forEach((p,i)=>{
  html+=`
  <div class="item">
  ${p.nome}<br>
  R$ ${p.preco}<br>
  Comprado: ${p.comprado}<br>
  <button onclick="comprar(${i})">Comprar</button>
  </div>`;
 });
 listaProdutos.innerHTML=html;

 // gráfico atual
 if(window.chart)chart.destroy();
 chart=new Chart(chart,{
  type:'bar',
  data:{
   labels:data.produtos.map(p=>p.nome),
   datasets:[{data:data.produtos.map(p=>p.preco*p.comprado)}]
  }
 });

 // gráfico histórico
 if(window.chartHistorico)chartHistorico.destroy();
 chartHistorico=new Chart(chartHistorico,{
  type:'line',
  data:{
   labels:Object.keys(data.historico),
   datasets:[{data:Object.values(data.historico)}]
  }
 });
}

render();

</script>
</body>
</html>
