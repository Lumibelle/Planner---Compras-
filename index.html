<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart List Premium</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  display:flex;
  background: radial-gradient(circle at top, #1e3a8a, #0f172a 70%);
  color:#fff;
}

/* efeito mágico */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:40px 40px;
  animation:stars 20s linear infinite;
  z-index:-1;
}

@keyframes stars{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}

.sidebar{
  width:90px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  gap:20px;
  height:100vh;
}

.sidebar div{
  cursor:pointer;
  padding:14px;
  border-radius:16px;
  transition:0.3s;
}

.sidebar .active{
  background:linear-gradient(135deg,#6366f1,#60a5fa);
}

.main{flex:1;padding:25px}
.hidden{display:none}

.card{
  background:linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:25px;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.item{
  padding:12px;
  border-radius:16px;
  transition:0.2s;
}

.item:hover{transform:scale(1.05)}
.ok{opacity:0.5;text-decoration:line-through}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.delete{background:#ef4444}

input,select{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div onclick="setView('home',this)" class="active">🏠</div>
<div onclick="setView('lista',this)">🛒</div>
<div onclick="setView('grafico',this)">📊</div>
</div>

<div class="main">

<h2 id="user"></h2>

<div id="home">
<div class="card">
<h3>Status</h3>
<p>Total: <span id="total"></span></p>
<p>Comprados: <span id="comprados"></span></p>
<p>Pendentes: <span id="pendentes"></span></p>
</div>
</div>

<div id="lista" class="hidden">
<button onclick="modoMercado()">Modo Mercado</button>
<div id="listaProdutos" class="grid"></div>
</div>

<div id="grafico" class="hidden">
<canvas id="chart"></canvas>
</div>

</div>

<script>

// 👤 usuário
let user = localStorage.getItem("user") || prompt("Seu nome:");
localStorage.setItem("user", user);
document.getElementById("user").innerText = "Olá, "+user;

// 📦 dados
let data = JSON.parse(localStorage.getItem("data")) || {
 categorias:{
  "Hortifruti":"#22c55e",
  "Carnes":"#ef4444",
  "Laticinios":"#facc15",
  "Mercearia":"#a78bfa",
  "Congelados":"#60a5fa",
  "Padaria":"#fb923c",
  "Limpeza":"#06b6d4",
  "Higiene":"#f472b6"
 },

 produtos:[
  {nome:"Alface x1",categoria:"Hortifruti",comprado:false},
  {nome:"Tomate x3",categoria:"Hortifruti",comprado:false},
  {nome:"Cenoura x2",categoria:"Hortifruti",comprado:false},
  {nome:"Cebola x3",categoria:"Hortifruti",comprado:false},

  {nome:"Carne bovina 2kg",categoria:"Carnes",comprado:false},
  {nome:"Carne moída 2kg",categoria:"Carnes",comprado:false},

  {nome:"Leite x2",categoria:"Laticinios",comprado:false},
  {nome:"Queijo x2",categoria:"Laticinios",comprado:false},

  {nome:"Feijão x2",categoria:"Mercearia",comprado:false},
  {nome:"Macarrão x2",categoria:"Mercearia",comprado:false},

  {nome:"Frango",categoria:"Congelados",comprado:false},

  {nome:"Pão",categoria:"Padaria",comprado:false},

  {nome:"Detergente",categoria:"Limpeza",comprado:false},

  {nome:"Shampoo",categoria:"Higiene",comprado:false}
 ]
};

// 💾 salvar
function save(){
 localStorage.setItem("data",JSON.stringify(data));
 render();
}

// 🧭 navegação
function setView(v,el){
 document.querySelectorAll(".sidebar div").forEach(d=>d.classList.remove("active"));
 el.classList.add("active");
 document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(v).classList.remove("hidden");
}

// 🛒 modo mercado
function modoMercado(){

 const ordem = [
  "Hortifruti",
  "Carnes",
  "Laticinios",
  "Congelados",
  "Mercearia",
  "Padaria",
  "Limpeza",
  "Higiene"
 ];

 data.produtos.sort((a,b)=>{
  return ordem.indexOf(a.categoria) - ordem.indexOf(b.categoria);
 });

 render();
}

// ✔ ações
function toggle(i){data.produtos[i].comprado=!data.produtos[i].comprado;save()}
function remove(i){data.produtos.splice(i,1);save()}

// 🔔 lembrete mensal
function lembreteMensal(){
 let hoje = new Date().getDate();
 if(hoje === 1){
  alert("Hora de revisar sua lista de compras!");
 }
}
setInterval(lembreteMensal, 86400000);

// 🎨 render
function render(){
 let html="",total=0,comp=0;

 data.produtos.forEach((p,i)=>{
  total++;
  if(p.comprado)comp++;

  html+=`
  <div class='item ${p.comprado?'ok':''}' style='background:${data.categorias[p.categoria]}'>
  ${p.nome}<br>
  <button onclick='toggle(${i})'>✔</button>
  <button class='delete' onclick='remove(${i})'>X</button>
  </div>`;
 });

 listaProdutos.innerHTML=html;
 total.innerText=total;
 comprados.innerText=comp;
 pendentes.innerText=total-comp;

 let cont={};
 data.produtos.forEach(p=>cont[p.categoria]=(cont[p.categoria]||0)+1);

 if(window.chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'doughnut',
  data:{labels:Object.keys(cont),datasets:[{data:Object.values(cont)}]}
 });
}

render();

</script>
</body>
</html>
