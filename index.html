<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner INSANO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:#f7f7fb;padding:15px;color:#333}
h1{margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.card{background:#fff;padding:15px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,0.08);transition:.2s}
.card:hover{transform:scale(1.02)}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ddd}
button{margin-top:8px;padding:8px;border:none;border-radius:10px;background:#6c63ff;color:white;cursor:pointer}
.badge{padding:4px 8px;border-radius:8px;font-size:12px;display:inline-block;margin-top:5px}
.red{background:#ffe5e5;color:#d33}
.yellow{background:#fff5cc;color:#b58b00}
.green{background:#e6ffea;color:#2e9b4f}
.actions{display:flex;gap:5px;flex-wrap:wrap}
.top{display:grid;gap:10px}
</style>
</head>
<body><h1 id="user"></h1><div class="card top">
<h3>Adicionar produto</h3>
<input id="nome" placeholder="Produto">
<input id="categoria" placeholder="Categoria">
<input id="qtd" type="number" placeholder="Qtd ideal">
<input id="preco" type="number" placeholder="Preço">
<button onclick="addItem()">Adicionar</button>
</div><div class="card">
<h3>Filtros</h3>
<select id="filtroCategoria" onchange="render()"></select>
<select id="filtroStatus" onchange="render()">
<option value="">Todos</option>
<option value="comprar">🔴 Comprar</option>
<option value="verificar">🟡 Verificar</option>
<option value="ok">🟢 OK</option>
</select>
</div><div class="grid" id="lista"></div><div class="card">
<h3>Gastos por categoria</h3>
<canvas id="grafico"></canvas>
</div><script>
let user = localStorage.getItem("user") || prompt("Seu nome:");
localStorage.setItem("user", user);
user && (document.getElementById("user").innerText = "Olá, " + user);

let items = JSON.parse(localStorage.getItem("items") || "[]");

function getStatus(i){
  if(i.estoque == 0) return {txt:"comprar", class:"red", label:"🔴 Comprar"};
  if(i.estoque < i.qtd) return {txt:"verificar", class:"yellow", label:"🟡 Verificar"};
  return {txt:"ok", class:"green", label:"🟢 OK"};
}

function addItem(){
  items.push({
    nome:nome.value,
    categoria:categoria.value,
    qtd:+qtd.value,
    preco:+preco.value,
    estoque:0,
    mes:new Date().toISOString().slice(0,7)
  });
  save();
}

function comprar(i){items[i].estoque++;save()}
function remover(i){items.splice(i,1);save()}
function editar(i){
  let novo = prompt("Novo nome:", items[i].nome);
  if(novo) items[i].nome = novo;
  save();
}

function save(){
  localStorage.setItem("items", JSON.stringify(items));
  render();
}

function render(){
  let lista="";
  let categoriasSet = new Set();
  let categoriasData={};

  items.forEach((i,index)=>{
    let st = getStatus(i);
    categoriasSet.add(i.categoria);

    if(filtroCategoria.value && i.categoria!=filtroCategoria.value) return;
    if(filtroStatus.value && st.txt!=filtroStatus.value) return;

    categoriasData[i.categoria]=(categoriasData[i.categoria]||0)+i.preco*i.estoque;

    lista += `
    <div class="card">
      <b>${i.nome}</b><br>
      ${i.categoria}<br>
      ${i.estoque}/${i.qtd}<br>
      R$ ${i.preco}<br>
      <div class="badge ${st.class}">${st.label}</div>
      <div class="actions">
        <button onclick="comprar(${index})">+1</button>
        <button onclick="editar(${index})">✏️</button>
        <button onclick="remover(${index})">🗑</button>
      </div>
    </div>`;
  });

  listaDiv.innerHTML = lista;

  filtroCategoria.innerHTML = '<option value="">Todas</option>' +
    [...categoriasSet].map(c=>`<option>${c}</option>`).join('');

  drawChart(categoriasData);
}

function drawChart(data){
  if(window.chart) window.chart.destroy();
  window.chart = new Chart(grafico,{
    type:'doughnut',
    data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
  });
}

render();
</script></body>
</html>
