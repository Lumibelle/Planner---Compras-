<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Market AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{display:flex;background:#0f172a;color:#fff}

.sidebar{
 width:80px;background:#020617;
 display:flex;flex-direction:column;
 align-items:center;padding:20px;gap:20px;
}

.icon{
 width:45px;height:45px;
 display:flex;align-items:center;justify-content:center;
 border-radius:12px;background:#111827;cursor:pointer;
}
.icon:hover{background:#2563eb}
.active{background:#2563eb}
.icon svg{width:22px;stroke:white}

.main{flex:1;padding:20px}

.cards{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;margin-bottom:20px;
}

.card{background:#1e293b;padding:15px;border-radius:12px}

.lista{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
 gap:10px;
}

.item{background:#334155;padding:10px;border-radius:10px}

button{
 margin-top:5px;padding:5px;border:none;
 border-radius:6px;background:#2563eb;color:#fff;
 cursor:pointer;
}

.delete{background:#ef4444}
.hidden{display:none}
</style>
</head>

<body>

<div class="sidebar">

<div class="icon active" onclick="setView('home',this)">
<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/></svg>
</div>

<div class="icon" onclick="setView('lista',this)">
<svg viewBox="0 0 24 24"><path d="M6 6h15l-1 9H6z"/></svg>
</div>

<div class="icon" onclick="setView('gastos',this)">
<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M6 14l3-3 4 4 5-6"/></svg>
</div>

<div class="icon" onclick="setView('historico',this)">
<svg viewBox="0 0 24 24"><path d="M12 8v5l3 3"/><circle cx="12" cy="12" r="9"/></svg>
</div>

</div>

<div class="main">

<h2>Smart Market AI</h2>

<!-- HOME -->
<div id="home">
<div class="cards">
<div class="card">Gasto atual: R$ <span id="gastoAtual"></span></div>
<div class="card">Previsão IA: R$ <span id="previsao"></span></div>
<div class="card">Mês: <span id="mesAtual"></span></div>
<div class="card">Itens: <span id="total"></span></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- LISTA -->
<div id="lista" class="hidden">
<div class="lista" id="listaProdutos"></div>
</div>

<!-- GASTOS -->
<div id="gastos" class="hidden">
<canvas id="chartGastos"></canvas>
</div>

<!-- HISTÓRICO -->
<div id="historico" class="hidden">
<canvas id="chartHistorico"></canvas>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || {

produtos:[

// HORTIFRUTI
{nome:"Alface",categoria:"Hortifruti",casa:0,necessario:1,comprar:1,preco:0,comprado:0},
{nome:"Tomate",categoria:"Hortifruti",casa:0,necessario:3,comprar:3,preco:0,comprado:0},
{nome:"Cenoura",categoria:"Hortifruti",casa:0,necessario:2,comprar:2,preco:0,comprado:0},
{nome:"Cebola",categoria:"Hortifruti",casa:0,necessario:3,comprar:3,preco:0,comprado:0},
{nome:"Maçã",categoria:"Hortifruti",casa:0,necessario:6,comprar:6,preco:0,comprado:0},

// CARNES
{nome:"Carne bovina",categoria:"Carnes",casa:0,necessario:2,comprar:2,preco:0,comprado:0},
{nome:"Carne moída",categoria:"Carnes",casa:0,necessario:2,comprar:2,preco:0,comprado:0},

// MERCEARIA
{nome:"Arroz",categoria:"Mercearia",casa:0,necessario:2,comprar:2,preco:0,comprado:0},
{nome:"Feijão",categoria:"Mercearia",casa:0,necessario:2,comprar:2,preco:0,comprado:0},

// LIMPEZA
{nome:"Detergente",categoria:"Limpeza",casa:0,necessario:3,comprar:3,preco:0,comprado:0},
{nome:"Sabão",categoria:"Limpeza",casa:0,necessario:1,comprar:1,preco:0,comprado:0}

],

historico:{}

};

// DATA
let hoje=new Date();
let chaveMes=`${hoje.getMonth()+1}/${hoje.getFullYear()}`;

function save(){
 localStorage.setItem("data",JSON.stringify(data));
 render();
}

function setView(v,el){
 document.querySelectorAll(".icon").forEach(i=>i.classList.remove("active"));
 el.classList.add("active");
 document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(v).classList.remove("hidden");
}

function comprar(i){
 data.produtos[i].comprado++;
 save();
}

function render(){

 let html="",gasto=0,gastoCat={};

 data.produtos.forEach((p,i)=>{

 let valor=p.preco*p.comprado;
 gasto+=valor;

 gastoCat[p.categoria]=(gastoCat[p.categoria]||0)+valor;

 html+=`
 <div class="item">
 <b>${p.nome}</b><br>
 Comprar: ${p.comprar}<br>
 Comprado: ${p.comprado}<br>
 Preço: <input value="${p.preco}" onchange="data.produtos[${i}].preco=this.value;save()"><br>
 Total: R$ ${(valor).toFixed(2)}<br>
 <button onclick="comprar(${i})">+ Comprar</button>
 </div>`;
 });

 listaProdutos.innerHTML=html;

 // histórico
 data.historico[chaveMes]=gasto;

 // previsão IA (média)
 let valores=Object.values(data.historico);
 let media=valores.reduce((a,b)=>a+b,0)/(valores.length||1);

 gastoAtual.innerText=gasto.toFixed(2);
 previsao.innerText=media.toFixed(2);
 mesAtual.innerText=chaveMes;
 total.innerText=data.produtos.length;

 // gráficos
 if(window.chart)chart.destroy();
 chart=new Chart(chart,{
  type:'bar',
  data:{labels:Object.keys(gastoCat),datasets:[{data:Object.values(gastoCat)}]}
 });

 if(window.chartHistorico)chartHistorico.destroy();
 chartHistorico=new Chart(chartHistorico,{
  type:'line',
  data:{labels:Object.keys(data.historico),datasets:[{data:Object.values(data.historico)}]}
 });

}

render();

</script>

</body>
</html>
