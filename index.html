<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart List Premium Final</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  display:flex;
  background:linear-gradient(135deg,#1e1b4b,#312e81,#4f46e5);
  color:#fff;
}

.sidebar{
  width:90px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 10px;
  gap:25px;
  height:100vh;
}

.sidebar div{
  cursor:pointer;
  padding:14px;
  border-radius:16px;
  transition:all 0.3s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sidebar div svg{
  stroke:#c7d2fe;
  transition:all 0.3s ease;
}

.sidebar div:hover{
  background:rgba(255,255,255,0.15);
  transform:scale(1.1);
}

.sidebar div:hover svg{
  stroke:#ffffff;
}

.sidebar .active{
  background:linear-gradient(135deg,#6366f1,#60a5fa);
  box-shadow:0 10px 25px rgba(99,102,241,0.6);
}

.sidebar .active svg{
  stroke:white;
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.7));
}

.sidebar div:hover{
  background:rgba(255,255,255,0.25);
  transform:scale(1.1);
}

.sidebar .active{
  background:linear-gradient(135deg,#6366f1,#60a5fa);
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.main{
  flex:1;
  padding:25px;
}

.hidden{display:none}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.item{
  padding:12px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  transition:0.25s;
  color:white;
}

.item:hover{
  transform:translateY(-5px) scale(1.02);
}

.ok{
  opacity:0.5;
  text-decoration:line-through;
}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.delete{background:#ef4444}

input,select{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

</style></head><body><div class="sidebar">
<div onclick="setView('home',this)" class="active">
<svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
</div><div onclick="setView('lista',this)">
<svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-13z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
</div><div onclick="setView('grafico',this)">
<svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
</div><div onclick="setView('mes',this)">
<svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
</div>
</div>
<div onclick="setView('lista',this)">🛒</div>
<div onclick="setView('grafico',this)">📊</div>
<div onclick="setView('mes',this)">📅</div>
</div><div class="main"><h2 id="user"></h2><div id="home">
<div class="cards">
<div class="card"><h3>Total</h3><p id="total"></p></div>
<div class="card"><h3>Comprados</h3><p id="comprados"></p></div>
<div class="card"><h3>Pendentes</h3><p id="pendentes"></p></div>
</div><div class="card">
<h3>🤖 Sugestões Inteligentes</h3>
<div id="sugestoes"></div>
</div>
</div><div id="lista" class="hidden">
<input id="nomeProduto" placeholder="Produto">
<select id="categoria"></select>
<button onclick="addProduto()">Adicionar</button>
<div id="listaProdutos" class="grid"></div>
</div><div id="grafico" class="hidden">
<canvas id="chart"></canvas>
</div><div id="mes" class="hidden">
<select onchange="render()">
<option>Jan</option>
<option>Fev</option>
<option>Mar</option>
</select>
</div></div><script>
let user = localStorage.getItem("user") || prompt("Seu nome:");
localStorage.setItem("user", user);
document.getElementById("user").innerText = "Olá, "+user;

let data = JSON.parse(localStorage.getItem("data")) || {
 categorias:{"Hortifruti":"#22c55e","Carnes":"#ef4444"},
 produtos:[{nome:"Tomate",categoria:"Hortifruti",comprado:false},{nome:"Carne",categoria:"Carnes",comprado:false}]
};

function save(){localStorage.setItem("data",JSON.stringify(data));render()}

function setView(v,el){
 document.querySelectorAll(".sidebar div").forEach(d=>d.classList.remove("active"));
 el.classList.add("active");
 document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(v).classList.remove("hidden");
}

function addProduto(){
 let nome = nomeProduto.value;
 let cat = categoria.value;
 if(!nome)return;
 data.produtos.push({nome,categoria:cat,comprado:false});
 nomeProduto.value="";
 save();
}

function toggle(i){data.produtos[i].comprado=!data.produtos[i].comprado;save()}
function remove(i){data.produtos.splice(i,1);save()}

function sugestoes(){
 let cont={};
 data.produtos.forEach(p=>cont[p.nome]=(cont[p.nome]||0)+1);
 let html="";
 Object.keys(cont).forEach(n=>{if(cont[n]>=2)html+=`<button onclick="addSug('${n}')">${n}</button>`});
 sugestoes.innerHTML=html||"Sem sugestões ainda";
}

function addSug(n){data.produtos.push({nome:n,categoria:Object.keys(data.categorias)[0],comprado:false});save()}

function render(){
 let html="",total=0,comp=0;
 data.produtos.forEach((p,i)=>{
 total++;
 if(p.comprado)comp++;
 html+=`<div class='item ${p.comprado?'ok':''}' style='background:${data.categorias[p.categoria]}'>
 ${p.nome}<br>
 <button onclick='toggle(${i})'>✔</button>
 <button class='delete' onclick='remove(${i})'>X</button>
 </div>`;
 });

 listaProdutos.innerHTML=html;
 totalEl = document.getElementById("total");
 totalEl.innerText=total;
 document.getElementById("comprados").innerText=comp;
 document.getElementById("pendentes").innerText=total-comp;

 let cont={};
 data.produtos.forEach(p=>cont[p.categoria]=(cont[p.categoria]||0)+1);
 if(window.chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{type:'doughnut',data:{labels:Object.keys(cont),datasets:[{data:Object.values(cont)}]}});

 categoria.innerHTML=Object.keys(data.categorias).map(c=>`<option>${c}</option>`).join("");
 sugestoes();
}

render();
</script></body>
</html>
